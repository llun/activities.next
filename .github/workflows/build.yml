name: Build & Test

# Runs after "Lint and Prettier" succeeds (workflow_run chain), so a commit is
# only built/tested once lint + prettier are green. The test job is gated behind
# the build job (needs: build), so build guards the tests.
#
# Because workflow_run runs are NOT shown in the PR checks list, each job posts a
# commit status (ci/build, ci/test) against the originating commit. Mark those
# contexts as required in branch protection to block merges on build/test failure.
#
# NOTE: workflow_run always uses the workflow definition from the default branch,
# so this chain only takes effect once this file is merged to main.

on:
  workflow_run:
    workflows: ['Lint and Prettier']
    types:
      - completed

permissions:
  contents: read
  statuses: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # workflow_run fires on completion regardless of outcome; only proceed when
    # the upstream lint/prettier run actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Report build pending
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=pending \
            -f context=ci/build \
            -f description="Build in progress" \
            -f target_url="$TARGET_URL"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Enable corepack
        run: corepack enable
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Build
        run: yarn build
      - name: Report build result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f context=ci/build \
            -f description="Build $STATE" \
            -f target_url="$TARGET_URL"

  test:
    name: All Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Report tests pending
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=pending \
            -f context=ci/test \
            -f description="Tests in progress" \
            -f target_url="$TARGET_URL"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Enable corepack
        run: corepack enable
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install
      - name: Run all tests
        run: yarn test
        env:
          TEST_DATABASE_TYPE: sqlite
      - name: Report tests result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f context=ci/test \
            -f description="Tests $STATE" \
            -f target_url="$TARGET_URL"
