name: Version Bump

on:
  push:
    branches:
      - main

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Skip if the push is a version bump commit (from a merged version-bump PR)
          HEAD_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$HEAD_MSG" | grep -qE '^Bump version to v'; then
            echo "Skipping: version bump commit already on main."
            echo "new_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get the latest version tag, default to v1.0.0 base if none exists
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing version tag found. Will create v1.0.0."
            echo "bump=initial" >> "$GITHUB_OUTPUT"
            echo "new_version=1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest tag: $LATEST_TAG"

          # Get commit hashes since last tag (excluding merge commits and bot version bumps)
          COMMIT_HASHES=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%H" --no-merges)

          if [ -z "$COMMIT_HASHES" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "new_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          # Read both subject and body to detect BREAKING CHANGE footers
          BUMP="patch"

          while IFS= read -r hash; do
            SUBJECT=$(git log -1 --pretty=format:"%s" "$hash")
            BODY=$(git log -1 --pretty=format:"%b" "$hash")

            # Skip version bump commits
            if echo "$SUBJECT" | grep -qE '^Bump version to v'; then
              continue
            fi

            # Check subject for breaking change marker (e.g. feat!: or fix(scope)!:)
            if echo "$SUBJECT" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              BUMP="major"
              break
            fi

            # Check body for BREAKING CHANGE footer
            if echo "$BODY" | grep -qE '^BREAKING[ -]CHANGE:'; then
              BUMP="major"
              break
            fi

            # Check for new features (minor bump, only upgrade from patch)
            if [ "$BUMP" != "minor" ] && echo "$SUBJECT" | grep -qE '^feat(\(.+\))?:'; then
              BUMP="minor"
            fi
          done <<< "$COMMIT_HASHES"

          echo "Bump type: $BUMP"

          # Parse current version from tag
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Use Node.js 24
        if: steps.bump.outputs.new_version != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package.json version
        if: steps.bump.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version

      - name: Create branch, commit, and open PR with auto-merge
        if: steps.bump.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="version-bump/v${NEW_VERSION}"

          # If the branch already exists, skip to PR creation/recovery
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            echo "Branch $BRANCH already exists, checking for PR."
          else
            git checkout -b "$BRANCH"
            git add package.json
            if git diff --cached --quiet; then
              echo "No package.json changes to commit, skipping."
              exit 0
            fi
            git commit -m "Bump version to v${NEW_VERSION}"
            git push origin "$BRANCH"
          fi

          # Skip if a PR for this branch already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #${EXISTING_PR}"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --title "Bump version to v${NEW_VERSION}" \
            --body "Automated version bump to v${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")

          echo "Created PR: $PR_URL"
          gh pr merge --auto --squash "$PR_URL"
          echo "Enabled auto-merge for $PR_URL"
