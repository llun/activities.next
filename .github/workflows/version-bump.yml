name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Get the latest version tag, default to v1.0.0 base if none exists
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing version tag found. Will create v1.0.0."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "new_version=1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest tag: $LATEST_TAG"

          # Get commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" --no-merges)

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "new_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          # Determine bump type from conventional commits
          BUMP="patch"

          while IFS= read -r msg; do
            # Check for breaking changes (major bump)
            if echo "$msg" | grep -qiE '(BREAKING CHANGE|^[a-z]+(\(.+\))?!:)'; then
              BUMP="major"
              break
            fi
            # Check for new features (minor bump)
            if echo "$msg" | grep -qiE '^feat(\(.+\))?:'; then
              BUMP="minor"
            fi
          done <<< "$COMMITS"

          echo "Bump type: $BUMP"

          # Parse current version from tag
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Use Node.js 24
        if: steps.bump.outputs.new_version != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package.json version
        if: steps.bump.outputs.new_version != ''
        run: |
          npm version ${{ steps.bump.outputs.new_version }} --no-git-tag-version

      - name: Commit and tag
        if: steps.bump.outputs.new_version != ''
        run: |
          git add package.json
          git commit -m "Bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --follow-tags
