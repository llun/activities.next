name: Tag Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag if version bump commit
        run: |
          HEAD_MSG=$(git log -1 --pretty=format:"%s")

          # Only tag commits that match the version bump pattern.
          # GitHub squash-merges produce titles like "Bump version to vX.Y.Z (#N)".
          if ! echo "$HEAD_MSG" | grep -qE '^Bump version to v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Not a version bump commit, skipping."
            exit 0
          fi

          NEW_VERSION=$(echo "$HEAD_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)

          if [ -z "$NEW_VERSION" ]; then
            echo "Could not extract version, skipping."
            exit 0
          fi

          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION already exists, skipping."
            exit 0
          fi

          git tag -a "$NEW_VERSION" -m "Version ${NEW_VERSION#v}"
          git push origin "$NEW_VERSION"
          echo "Created and pushed tag $NEW_VERSION"
