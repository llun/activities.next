version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      # The better-auth stack pins exact cross-package peer versions: better-auth
      # and @better-auth/core require a specific @better-fetch/fetch (e.g.
      # better-auth 1.6.19 -> @better-auth/core 1.6.19 + @better-fetch/fetch 1.3.1).
      # Bumping any one of them on its own leaves the others behind and breaks the
      # auth client's type inference (authClient.signIn.passkey disappears, failing
      # `next build`). Group them so dependabot upgrades the whole stack in one PR.
      # See PRs #1003 and #1011 (both broke the build via piecemeal bumps).
      better-auth:
        patterns:
          - 'better-auth'
          - '@better-auth/*'
          - '@better-fetch/fetch'
          - 'better-call'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
